<script>

const LD = { '隶属': true, '研究': true }; // 虚线类型

// ─────────────────────── 节点数据（谢晓亮关系网络）────────────────────────────────
const N = [

    {

        lbl: '谢晓亮',

        tags: ['中科院院士', '三院外籍院士', '单细胞基因组学']
    },

    // 求学机构
    { id: 'pku_edu', lbl: '北京大学', g: 'edu', r: 14, desc: '化学学士 (1984年)\n成长于北大燕园', tags: ['本科', '化学'] },
    { id: 'ucsd', lbl: ['加州大学', '圣地亚哥分校'], g: 'edu', r: 14, desc: '化学博士 (1990年)', tags: ['博士', '化学'] },
    { id: 'uchicago', lbl: '芝加哥大学', g: 'edu', r: 14, desc: '博士后研究 (1990-1992年)', tags: ['博士后'] },

    // 任职机构
    { id: 'pnnl', lbl: ['太平洋西北', '国家实验室'], g: 'career', r: 14, desc: '1992年起建立独立研究组', tags: ['独立PI'] },
    { id: 'harvard', lbl: '哈佛大学', g: 'career', r: 18, desc: '1999年：改革开放后哈佛聘任的\n第一位来自中国大陆的终身教授\n2009年：第一位冠名讲席教授', tags: ['终身教授', '冠名讲席'] },
    { id: 'pku_career', lbl: '北京大学', g: 'career', r: 22, desc: '2010年创立BIOPIC\n2018年全职回北大\n李兆基讲席教授', tags: ['全职归国', '李兆基讲席'] },
    { id: 'changping', lbl: '昌平实验室', g: 'career', r: 18, desc: '2020年起担任主任\n国家级生命科学实验室', tags: ['主任'] },

    // 创立/技术成果
    { id: 'biopic', lbl: ['生物医学前沿', '创新中心(BIOPIC)'], g: 'founded', r: 16, desc: '2010年创立于北京大学\n原名：生物动态光学成像中心\n生命科学前沿技术研发与转化', tags: ['2010创立', '技术转化'] },
    { id: 'foodie', lbl: 'FOODIE技术', g: 'founded', r: 14, desc: '单分子单细胞转录因子足迹技术\n近单碱基分辨率解析基因组调控图谱\n已转化为试剂盒', tags: ['脱氨酶', '调控图谱'] },
    { id: 'scmicroc', lbl: 'scMicro-C', g: 'founded', r: 14, desc: '单细胞三维基因组结构技术\n千碱基精度，首次发现多增强子中心\n发表于《Nature Genetics》', tags: ['单细胞', '3D基因组'] },
    { id: 'cgm', lbl: 'CGM技术', g: 'founded', r: 14, desc: '优化单细胞RNA测序基因模块识别\n更高精度基因关联分析', tags: ['单细胞', 'RNA'] },
    { id: 'malbac', lbl: 'MALBAC', g: 'founded', r: 16, desc: '全基因组扩增技术\n已助力上万单基因遗传病家庭\n避免致病后代出生', tags: ['全基因组扩增', '遗传病防治'] },
    { id: 'sa55', lbl: 'SA55抗体', g: 'founded', r: 16, desc: '广谱中和抗体\n对XBB等所有新冠变异株保持高中和活性\n已进入临床试验', tags: ['新冠', '广谱中和'] },

    // 师承学生
    { id: 'lusj', lbl: '陆思嘉', g: 'student', r: 14, desc: '哈佛期间博士生\nMALBAC技术共同发明人', tags: ['MALBAC', '哈佛'] },
    { id: 'zongch', lbl: '宗诚航', g: 'student', r: 14, desc: '哈佛期间博士后\nMALBAC技术共同发明人', tags: ['MALBAC', '哈佛'] },
    { id: 'caoyl', lbl: '曹云龙', g: 'student', r: 16, desc: '现任昌平实验室领衔科学家\n在谢晓亮指导下完成SA55抗体基础研发', tags: ['SA55', '昌平实验室'] },

    // 学术合作者
    { id: 'qiaoj', lbl: '乔杰', g: 'collab', r: 16, desc: '中国工程院院士\n北京大学第三医院生殖医学专家\nMALBAC临床转化核心合作者', tags: ['工程院院士', '生殖医学'] },
    { id: 'tangfc', lbl: '汤富酬', g: 'collab', r: 14, desc: '北京大学教授\n单细胞测序技术先驱\n与谢晓亮、乔杰组成产学研医铁三角', tags: ['单细胞测序', 'MALBAC'] },
    { id: 'tanlz', lbl: '谭隆志', g: 'collab', r: 14, desc: '斯坦福大学教授\nscMicro-C技术合作研发者', tags: ['斯坦福', '3D基因组'] },
    { id: 'mawp', lbl: '马文平', g: 'collab', r: 14, desc: '昌平实验室副研究员\nCGM技术并列第一作者', tags: ['CGM', '基因模块'] },
    { id: 'hers', lbl: '何润生', g: 'collab', r: 14, desc: 'BIOPIC/昌平实验室副研究员\nFOODIE技术并列第一作者', tags: ['FOODIE', '转录因子'] },

    // 奖项荣誉
    { id: 'cas_acad', lbl: '中国科学院院士', g: 'award', r: 13, desc: '' },
    { id: 'us_tri_acad', lbl: ['美国三院', '外籍院士'], g: 'award', r: 13, desc: '国家科学院 · 医学院 · 艺术与科学学院' },
    { id: 'albany', lbl: '阿尔伯尼奖', g: 'award', r: 13, desc: '美国生物医学最高奖之一' },
    { id: 'debye', lbl: 'Peter Debye奖', g: 'award', r: 13, desc: '美国物理化学最高奖' },
    { id: 'founders', lbl: 'Founders奖', g: 'award', r: 13, desc: '美国生物物理最高奖' },

    // 产业合作企业
    { id: 'vazyme', lbl: '南京诺唯赞', g: 'biz', r: 13, desc: '与FOODIE技术合作开发\nHyperactive FOODIE Library Prep Kit', tags: ['试剂盒'] },
    { id: 'sinovac', lbl: '科兴', g: 'biz', r: 13, desc: 'SA55抗体产业化合作方\n鼻喷和注射两种剂型进入临床试验', tags: ['疫苗', 'GMP生产'] },

    // 研究方向
    { id: 'biophys', lbl: '单分子生物物理化学', g: 'research', r: 13, desc: '奠基人之一' },
    { id: 'singlecell', lbl: '单细胞基因组学', g: 'research', r: 13, desc: '开拓者，技术临床转化' },
    { id: 'imaging', lbl: '相干拉曼散射显微成像', g: 'research', r: 13, desc: '开拓者' }
];

// ─────────────────────── 关系数据 ────────────────────────────────────────────────
const L = [
    // 求学
    { s: 'xxl', t: 'pku_edu', type: '求学', lbl: '学士1984' },
    { s: 'xxl', t: 'ucsd', type: '求学', lbl: '博士1990' },
    { s: 'xxl', t: 'uchicago', type: '求学', lbl: '博士后' },

    // 工作
    { s: 'xxl', t: 'pnnl', type: '工作', lbl: '1992-1999' },
    { s: 'xxl', t: 'harvard', type: '工作', lbl: '1999-2018' },
    { s: 'xxl', t: 'pku_career', type: '工作', lbl: '2018-今' },
    { s: 'xxl', t: 'changping', type: '工作', lbl: '2020-今主任' },

    // 创立
    { s: 'xxl', t: 'biopic', type: '创立', lbl: '2010创立' },
    { s: 'xxl', t: 'foodie', type: '创立', lbl: '技术开发' },
    { s: 'xxl', t: 'scmicroc', type: '创立', lbl: '技术开发' },
    { s: 'xxl', t: 'cgm', type: '创立', lbl: '技术开发' },
    { s: 'xxl', t: 'malbac', type: '创立', lbl: '技术开发' },
    { s: 'xxl', t: 'sa55', type: '创立', lbl: '抗体筛选' },

    // 隶属
    { s: 'pku_career', t: 'biopic', type: '隶属', lbl: '' },

    // 师承
    { s: 'xxl', t: 'lusj', type: '师承', lbl: '博士生' },
    { s: 'xxl', t: 'zongch', type: '师承', lbl: '博士后' },
    { s: 'xxl', t: 'caoyl', type: '师承', lbl: '指导研发' },

    // 合作
    { s: 'xxl', t: 'qiaoj', type: '合作', lbl: 'MALBAC临床' },
    { s: 'xxl', t: 'tangfc', type: '合作', lbl: '单细胞测序' },
    { s: 'xxl', t: 'tanlz', type: '合作', lbl: 'scMicro-C' },
    { s: 'xxl', t: 'mawp', type: '合作', lbl: 'CGM技术' },
    { s: 'xxl', t: 'hers', type: '合作', lbl: 'FOODIE技术' },
    { s: 'xxl', t: 'caoyl', type: '合作', lbl: 'SA55抗体' },

    // 商业
    { s: 'foodie', t: 'vazyme', type: '商业', lbl: '试剂盒转化' },
    { s: 'sa55', t: 'sinovac', type: '商业', lbl: '产业化开发' },

    // 荣誉
    { s: 'xxl', t: 'cas_acad', type: '荣誉', lbl: '' },
    { s: 'xxl', t: 'us_tri_acad', type: '荣誉', lbl: '' },
    { s: 'xxl', t: 'albany', type: '荣誉', lbl: '生物医学' },
    { s: 'xxl', t: 'debye', type: '荣誉', lbl: '物理化学' },
    { s: 'xxl', t: 'founders', type: '荣誉', lbl: '生物物理' },

    // 研究
    { s: 'xxl', t: 'biophys', type: '研究', lbl: '奠基' },
    { s: 'xxl', t: 'singlecell', type: '研究', lbl: '开拓' },
    { s: 'xxl', t: 'imaging', type: '研究', lbl: '开拓' }
];

// ─────────────────────── CANVAS 初始化 ──────────────────────────────────────────
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function setSize() {
    cv.width = window.innerWidth * dpr;
    cv.height = window.innerHeight * dpr;
    cv.style.width = window.innerWidth + 'px';
    cv.style.height = window.innerHeight + 'px';
}
setSize();
window.addEventListener('resize', setSize);

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ─────────────────────── 初始位置布局 ──────────────────────────────────────────
const GP = {
    core: [0, 0],
    edu: [-0.36, -0.08],
    career: [0.02, -0.34],
    founded: [0.18, 0.08],
    student: [0.38, 0.06],
    collab: [0.04, 0.36],
    award: [-0.22, 0.3],
    research: [-0.36, 0.22],
    biz: [0.38, -0.2],
    initiative: [0.12, 0.42]
};
const gcnt = {},
    gidx = {};
N.forEach(n => { gcnt[n.g] = (gcnt[n.g] || 0) + 1; });
N.forEach(n => {
    const gp = GP[n.g] || [0, 0];
    gidx[n.g] = (gidx[n.g] || 0) + 1;
    const idx = gidx[n.g],
        cnt = gcnt[n.g];
    const spread = Math.min(cnt * 38, 150);
    const angle = (idx / cnt) * Math.PI * 2;
    n.x = W() / 2 + gp[0] * W() * 0.4 + Math.cos(angle) * spread * 0.5 + (Math.random() - 0.5) * 20;
    n.y = H() / 2 + gp[1] * H() * 0.4 + Math.sin(angle) * spread * 0.5 + (Math.random() - 0.5) * 20;
    n.vx = 0;
    n.vy = 0;
    n.dragging = false;
});

// 解析链接
const NM = new Map(N.map(n => [n.id, n]));
const links = L.map(l => ({ src: NM.get(l.s), tgt: NM.get(l.t), type: l.type, lbl: l.lbl }))
    .filter(l => l.src && l.tgt);

document.getElementById('nc').textContent = N.length;
document.getElementById('lc').textContent = links.length;

// ─────────────────────── 力导向模拟 ──────────────────────────────────────────
const LDIST = { '求学': 130, '工作': 140, '创立': 118, '师承': 130, '商业': 105, '合作': 165, '荣誉': 105, '研究': 108,
    '隶属': 82 };
let alpha = 1.0;

function tick() {
    if (alpha < 0.002) return;
    alpha *= 0.975;

    // 斥力
    for (let i = 0; i < N.length; i++) {
        const a = N[i];
        for (let j = i + 1; j < N.length; j++) {
            const b = N[j];
            const dx = b.x - a.x,
                dy = b.y - a.y;
            const d2 = dx * dx + dy * dy + 1;
            const d = Math.sqrt(d2);
            const str = (a.g === 'core' || b.g === 'core') ? 20000 : 5500;
            const f = str / d2;
            const fx = f * dx / d,
                fy = f * dy / d;
            a.vx -= fx;
            a.vy -= fy;
            b.vx += fx;
            b.vy += fy;
        }
    }

    // 弹簧
    links.forEach(l => {
        const dx = l.tgt.x - l.src.x,
            dy = l.tgt.y - l.src.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const rest = LDIST[l.type] || 140;
        const f = (d - rest) * 0.1;
        const fx = f * dx / d,
            fy = f * dy / d;
        l.src.vx += fx;
        l.src.vy += fy;
        l.tgt.vx -= fx;
        l.tgt.vy -= fy;
    });

    // 中心引力
    N.forEach(n => {
        n.vx += (W() / 2 - n.x) * 0.008;
        n.vy += (H() / 2 - n.y) * 0.008;
    });

    // 速度积分
    N.forEach(n => {
        if (n.dragging) return;
        n.vx *= 0.78;
        n.vy *= 0.78;
        n.x += n.vx * alpha;
        n.y += n.vy * alpha;
    });
}

// ─────────────────────── 视图变换 ──────────────────────────────────────────────
let tx = 0,
    ty = 0,
    sc = 1;

function toScreen(wx, wy) { return [wx * sc + tx, wy * sc + ty]; }

function toWorld(sx, sy) { return [(sx - tx) / sc, (sy - ty) / sc]; }

// ─────────────────────── 碰撞检测 ──────────────────────────────────────────────
function nodeAt(sx, sy) {
    const [wx, wy] = toWorld(sx, sy);
    for (let i = N.length - 1; i >= 0; i--) {
        const n = N[i],
            dx = n.x - wx,
            dy = n.y - wy;
        if (dx * dx + dy * dy < n.r * n.r) return n;
    }
    return null;
}

// ─────────────────────── 高亮关联集合 ──────────────────────────────────────────
function connected(node) {
    const ids = new Set([node.id]);
    links.forEach(l => {
        if (l.src.id === node.id) ids.add(l.tgt.id);
        if (l.tgt.id === node.id) ids.add(l.src.id);
    });
    return ids;
}

// ─────────────────────── 颜色工具 ──────────────────────────────────────────────
function rgba(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16),
        g = parseInt(hex.slice(3, 5), 16),
        b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;
}

function lighter(hex, n = 60) {
    return '#' + [1, 3, 5].map(i => Math.min(255, parseInt(hex.slice(i, i + 2), 16) + n)
        .toString(16).padStart(2, '0')).join('');
}

// ─────────────────────── 绘制 ──────────────────────────────────────────────────
let hovNode = null,
    selNode = null;

function draw() {
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx.clearRect(0, 0, W(), H());

    const conn = selNode ? connected(selNode) : null;

    // 绘制连线
    links.forEach(l => {
        const [x1, y1] = toScreen(l.src.x, l.src.y);
        const [x2, y2] = toScreen(l.tgt.x, l.tgt.y);
        const col = LC[l.type] || '#4a6a9a';
        let op = 0.55;
        if (conn) op = (conn.has(l.src.id) && conn.has(l.tgt.id)) ? 0.85 : 0.06;

        const dx = x2 - x1,
            dy = y2 - y1,
            dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const ex = x2 - (l.tgt.r * sc + 9) * dx / dist;
        const ey = y2 - (l.tgt.r * sc + 9) * dy / dist;

        cx.save();
        cx.globalAlpha = op;
        if (LD[l.type]) cx.setLineDash([4, 3]);
        else cx.setLineDash([]);
        cx.beginPath();
        cx.moveTo(x1, y1);
        cx.lineTo(ex, ey);
        cx.strokeStyle = col;
        cx.lineWidth = 1.5;
        cx.stroke();

        // 箭头
        const ang = Math.atan2(ey - y1, ex - x1);
        cx.setLineDash([]);
        cx.beginPath();
        cx.moveTo(ex, ey);
        cx.lineTo(ex - 8 * Math.cos(ang - 0.38), ey - 8 * Math.sin(ang - 0.38));
        cx.lineTo(ex - 8 * Math.cos(ang + 0.38), ey - 8 * Math.sin(ang + 0.38));
        cx.closePath();
        cx.fillStyle = col;
        cx.fill();

        // 标签
        if (l.lbl && op > 0.2) {
            const fs = Math.max(8, 9 * Math.min(sc, 1.4));
            cx.font = `${fs}px 'PingFang SC','Microsoft YaHei',sans-serif`;
            cx.fillStyle = '#7a9abd';
            cx.textAlign = 'center';
            cx.textBaseline = 'middle';
            cx.fillText(l.lbl, (x1 + x2) / 2, (y1 + y2) / 2 - 4);
        }
        cx.restore();
    });

    // 绘制节点
    N.forEach(n => {
        const [sx, sy] = toScreen(n.x, n.y);
        const sr = n.r * sc;
        const col = GC[n.g] || '#4a6a9a';
        let op = 1;
        if (conn && !conn.has(n.id)) op = 0.12;

        cx.save();
        cx.globalAlpha = op;

        // 核心脉冲环
        if (n.g === 'core') {
            cx.beginPath();
            cx.arc(sx, sy, sr + 11, 0, Math.PI * 2);
            cx.strokeStyle = rgba('#ff6b35', 0.22);
            cx.lineWidth = 1.5;
            cx.setLineDash([5, 4]);
            cx.stroke();
            cx.setLineDash([]);
        }

        // 悬浮/选中光晕
        if (n === hovNode || n === selNode) {
            const grd = cx.createRadialGradient(sx, sy, sr * 0.4, sx, sy, sr + 10);
            grd.addColorStop(0, rgba(col, 0.35));
            grd.addColorStop(1, rgba(col, 0));
            cx.beginPath();
            cx.arc(sx, sy, sr + 10, 0, Math.PI * 2);
            cx.fillStyle = grd;
            cx.fill();
        }

        // 主体圆
        cx.beginPath();
        cx.arc(sx, sy, sr, 0, Math.PI * 2);
        cx.fillStyle = rgba(col, n.g === 'core' ? 1 : 0.82);
        cx.fill();
        cx.strokeStyle = lighter(col, 55);
        cx.lineWidth = n.g === 'core' ? 2.5 : 1.5;
        cx.stroke();

        // 标签
        const lines = Array.isArray(n.lbl) ? n.lbl : [n.lbl];
        const fs = Math.max(8, Math.min(13, n.r * 0.44)) * Math.max(0.65, sc);
        cx.font = (n.g === 'core' ? 'bold ' : '') + `${fs}px 'PingFang SC','Microsoft YaHei',sans-serif`;
        cx.textAlign = 'center';
        cx.textBaseline = 'middle';

        if (n.g === 'core') {
            cx.fillStyle = '#fff';
            const lh = fs * 1.35;
            lines.forEach((ln, i) => {
                cx.fillText(ln, sx, sy + (i - (lines.length - 1) / 2) * lh);
            });
        } else {
            cx.fillStyle = '#d4e8f8';
            const lh = Math.max(10, fs * 1.25);
            const by = sy + sr + 3;
            lines.forEach((ln, i) => { cx.fillText(ln, sx, by + i * lh + lh * 0.5); });
        }

        cx.restore();
    });
}

// ─────────────────────── 动画循环 ──────────────────────────────────────────────
(function loop() { tick();
    draw();
    requestAnimationFrame(loop); })();

// ─────────────────────── 提示框 ─────────────────────────────────────────────────
const tip = document.getElementById('tooltip');

function showTip(n, e) {
    const lbl = Array.isArray(n.lbl) ? n.lbl.join(' ') : n.lbl;
    tip.innerHTML =
        `<h3>${lbl}</h3><div class="desc">${n.desc}</div>${n.tags.map(t => `<span class="tag">${t}</span>`).join('')}`;
    tip.style.display = 'block';
    let lx = e.clientX + 15,
        ly = e.clientY - 10;
    if (lx + 290 > W()) lx = e.clientX - 295;
    if (ly + 220 > H()) ly = e.clientY - 220;
    tip.style.left = lx + 'px';
    tip.style.top = ly + 'px';
}

function hideTip() { tip.style.display = 'none'; }

// ─────────────────────── 鼠标事件 ──────────────────────────────────────────────
let panning = false,
    panOrig = null,
    dragN = null,
    moveDistSq = 0,
    mdPos = null;

function getXY(e) {
    const r = cv.getBoundingClientRect();
    return [e.clientX - r.left, e.clientY - r.top];
}

cv.addEventListener('mousemove', e => {
    const [sx, sy] = getXY(e);
    if (mdPos) moveDistSq = (sx - mdPos[0]) ** 2 + (sy - mdPos[1]) ** 2;

    if (dragN) {
        const [wx, wy] = toWorld(sx, sy);
        dragN.x = wx;
        dragN.y = wy;
        dragN.vx = 0;
        dragN.vy = 0;
        alpha = Math.max(alpha, 0.2);
        return;
    }
    if (panning) { tx = sx - panOrig[0];
        ty = sy - panOrig[1]; return; }

    const n = nodeAt(sx, sy);
    hovNode = n;
    cv.style.cursor = n ? 'pointer' : 'grab';
    if (n) showTip(n, e);
    else hideTip();
});

cv.addEventListener('mousedown', e => {
    const [sx, sy] = getXY(e);
    mdPos = [sx, sy];
    moveDistSq = 0;
    const n = nodeAt(sx, sy);
    if (n) { dragN = n;
        n.dragging = true; } else { panning = true;
        panOrig = [sx - tx, sy - ty]; }
    cv.classList.add('grabbing');
});

cv.addEventListener('mouseup', e => {
    const [sx, sy] = getXY(e);
    if (moveDistSq < 16) {
        const n = nodeAt(sx, sy);
        selNode = n ? (selNode === n ? null : n) : null;
    }
    if (dragN) { dragN.dragging = false;
        dragN = null; }
    panning = false;
    mdPos = null;
    cv.classList.remove('grabbing');
    cv.style.cursor = 'grab';
});

cv.addEventListener('mouseleave', () => {
    panning = false;
    if (dragN) { dragN.dragging = false;
        dragN = null; }
    hideTip();
    cv.classList.remove('grabbing');
});

cv.addEventListener('wheel', e => {
    e.preventDefault();
    const [sx, sy] = getXY(e);
    const factor = e.deltaY < 0 ? 1.12 : 0.89;
    const nsc = Math.max(0.18, Math.min(4.5, sc * factor));
    tx = sx - (sx - tx) * (nsc / sc);
    ty = sy - (sy - ty) * (nsc / sc);
    sc = nsc;
}, { passive: false });

// 触摸支持
let t0 = null;
cv.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const r = cv.getBoundingClientRect();
    const sx = t.clientX - r.left,
        sy = t.clientY - r.top;
    const n = nodeAt(sx, sy);
    if (n) { dragN = n;
        n.dragging = true; } else { panning = true;
        panOrig = [sx - tx, sy - ty];
        t0 = [sx, sy]; }
}, { passive: false });

cv.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    const r = cv.getBoundingClientRect();
    const sx = t.clientX - r.left,
        sy = t.clientY - r.top;
    if (dragN) { const [wx, wy] = toWorld(sx, sy);
        dragN.x = wx;
        dragN.y = wy;
        alpha = Math.max(alpha, 0.2); } else if (panning) { tx = sx - panOrig[0];
        ty = sy - panOrig[1]; }
}, { passive: false });

cv.addEventListener('touchend', e => {
    if (dragN) { dragN.dragging = false;
        dragN = null; }
    panning = false;
    if (t0 && e.changedTouches.length) {
        const t = e.changedTouches[0];
        const r = cv.getBoundingClientRect();
        const sx = t.clientX - r.left,
            sy = t.clientY - r.top;
        if ((sx - t0[0]) ** 2 + (sy - t0[1]) ** 2 < 25) {
            const n = nodeAt(sx, sy);
            selNode = n ? (selNode === n ? null : n) : null;
        }
    }
    t0 = null;
});

// 双指缩放
let lastDist = null;
cv.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
        const r = cv.getBoundingClientRect();
        const t0 = e.touches[0],
            t1 = e.touches[1];
        const d = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
        if (lastDist) {
            const factor = d / lastDist;
            const mx = (t0.clientX + t1.clientX) / 2 - r.left;
            const my = (t0.clientY + t1.clientY) / 2 - r.top;
            const nsc = Math.max(0.18, Math.min(4.5, sc * factor));
            tx = mx - (mx - tx) * (nsc / sc);
            ty = my - (my - ty) * (nsc / sc);
            sc = nsc;
        }
        lastDist = d;
    } else { lastDist = null; }
}, { passive: false });
cv.addEventListener('touchend', () => { lastDist = null; });
</script>
</body>
